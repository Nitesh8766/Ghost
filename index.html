<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline Ghost | GhostLayer Archive</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <!-- ghosts do not live on servers -->
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">GHOSTLAYER ARCHIVE</p>
      <h1>Everything Has Been Wiped</h1>
      <p class="lead">
        The public server contains no secrets. The archive is dead, the logs are burned,
        and the vault is offline.
      </p>
      <div class="status-grid">
        <div><span>Server Status</span><strong class="red">WIPED</strong></div>
        <div><span>Vault Status</span><strong>UNKNOWN</strong></div>
        <div><span>Archive Mode</span><strong>OFFLINE</strong></div>
      </div>
      <blockquote>“Ghosts do not answer online.”</blockquote>
      <p class="tiny">The browser remembers what the server forgot.</p>
    </section>
  </main>
  <script src="./assets/ghost.js"></script>
</body>
</html>
